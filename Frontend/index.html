    <style>
      :root {
        --ease-clinical: cubic-bezier(0.2, 0.8, 0.2, 1);
        --ease-clinical-emphasis: cubic-bezier(0.16, 1, 0.3, 1);
        --motion-fast: 160ms;
        --motion-medium: 260ms;
        --motion-slow: 420ms;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Source Sans 3", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-feature-settings: "kern", "liga", "calt";
        text-rendering: optimizeLegibility;
        letter-spacing: 0;
      }

      h1,
      h2,
      h3,
      h4 {
        letter-spacing: 0;
        line-height: 1.14;
      }

      button,
      a,
      input,
      textarea,
      select {
        transition-duration: var(--motion-fast);
        transition-timing-function: var(--ease-clinical);
      }

      button:not(:disabled),
      a,
      [role="button"] {
        transition-property: color, background-color, border-color, box-shadow, transform, opacity;
      }

      button:not(:disabled):active,
      [role="button"]:not(:disabled):active {
        transform: translateY(1px) scale(0.99);
      }

      input,
      textarea,
      select {
        transition-property: border-color, box-shadow, background-color, color;
      }

      .app-shell {
        min-height: 100vh;
        animation: app-shell-in var(--motion-slow) var(--ease-clinical-emphasis) both;
      }

      .view-transition {
        animation: view-enter var(--motion-medium) var(--ease-clinical-emphasis) both;
        will-change: opacity, transform;
      }

      .surface-motion {
        transition: transform var(--motion-medium) var(--ease-clinical), box-shadow var(--motion-medium) var(--ease-clinical), border-color var(--motion-medium) var(--ease-clinical), background-color var(--motion-medium) var(--ease-clinical);
      }

      .surface-motion:hover {
        transform: translateY(-2px);
      }

      .typing-dot {
        animation: typing-dot 1.2s var(--ease-clinical) infinite;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 160ms;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 320ms;
      }

      @keyframes app-shell-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes view-enter {
        from {
          opacity: 0;
          transform: translateY(10px);
          filter: blur(3px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      @keyframes typing-dot {
        0%,
        72%,
        100% {
          opacity: 0.35;
          transform: translateY(0);
        }
        36% {
          opacity: 1;
          transform: translateY(-2px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Patient Dashboard Theme Overrides - Healing & Tranquility Palette */
      .patient-theme {
        --patient-primary: #506a5a; /* sage-600 */
        --patient-primary-hover: #42564a; /* sage-700 */
        --patient-primary-light: #e5ebe6; /* sage-100 */
        --patient-secondary: #386c82; /* tranquil-600 */
        --patient-accent: #ab793a; /* healing-500 */
        --patient-bg: #f4f7f5; /* sage-50 */
        --patient-surface: #ffffff;
      }

      .patient-theme .bg-blue-500,
      .patient-theme .bg-blue-600 {
        background-color: var(--patient-primary) !important;
      }
      .patient-theme .hover\:bg-blue-600:hover,
      .patient-theme .hover\:bg-blue-700:hover {
        background-color: var(--patient-primary-hover) !important;
      }
      .patient-theme .text-blue-500,

      .dark .patient-theme .text-blue-400,

      .patient-theme .ring-blue-500,

        --tw-ring-color: var(--patient-primary) !important;
      }
